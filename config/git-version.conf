# git-version configuration file
# Copy this file to your project root and customize as needed

# Version file location (relative to git root)
VERSION_FILE=VERSION.txt

# Changelog file location (relative to git root)
CHANGELOG_FILE=CHANGELOG.md

# Changelog template location (absolute or relative path)
CHANGELOG_TEMPLATE=templates/CHANGELOG.md.tmpl

# Git tag prefix (default: v)
TAG_PREFIX=v

# Enable/disable git hooks
ENABLE_POST_COMMIT_HOOK=true
ENABLE_PRE_PUSH_HOOK=true

# Auto-bump on breaking changes (requires post-commit hook)
AUTO_BUMP_ON_BREAKING=true

# Verbosity level: 0=error, 1=warn, 2=info, 3=debug
VERBOSITY=2

# Commit types that trigger a minor version bump
MINOR_TYPES=feat

# Commit types that trigger a patch version bump
PATCH_TYPES=fix,perf,refactor

# Include internal commits (chore, test, etc.) in changelog
INCLUDE_INTERNAL_COMMITS=false
